<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="http://localhost:8080/lianggeshipin/css/boots/bootstrap.min.css">
<script src="http://localhost:8080/lianggeshipin/js/jquery.min.js"></script>
<title>Insert title here</title>
</head>
<body>
<div class="container-fluid">
	<div class="jumbotron">
	  <h1 class="display-4">元气满满的一天</h1>
	  <p class="lead">This is a simple hero unit, a simple jumbotron-style component for calling extra attention to featured content or information.</p>
	  <hr class="my-4">
	  <p>It uses utility classes for typography and spacing to space content out within the larger container.</p>
	  <a class="btn btn-primary btn-lg" href="#" role="button">回首页</a>
	</div>
	<div class="alert alert-primary" role="alert">
	  小猪佩奇第一季
	</div>
	<table class="table">
  <thead>
    <tr>
      <th scope="col">哪一集</th>
      <th scope="col">标题</th>
      <th scope="col">视频地址</th>
      <th scope="col">图片地址</th>
    </tr>
  </thead>
  <form action="http://localhost:8080/lianggeshipin/">
  			<input type="hidden" name="animatedID" value="">
	  <tbody>
	    <tr>
	      <td><input type="number" class="form-control is-valid" name="which1"  required></td>
	      <td><input type="text" class="form-control is-valid" name="plotName1"  required></td>
	      <td><input type="text" class="form-control is-valid" name="videoUrl1"  required></td>
	      <td><input type="text" class="form-control is-valid" name="imgUrl1"  required></td>
	    </tr>
	    <tr>
	      <td><input type="number" class="form-control is-valid" name="which2"  required></td>
	      <td><input type="text" class="form-control is-valid" name="plotName2"  required></td>
	      <td><input type="text" class="form-control is-valid" name="videoUrl2"  required></td>
	      <td><input type="text" class="form-control is-valid" name="imgUrl2"  required></td>
	    </tr>
	    <tr>
	      <td><input type="number" class="form-control is-valid" name="which3"  required></td>
	      <td><input type="text" class="form-control is-valid" name="plotName3"  required></td>
	      <td><input type="text" class="form-control is-valid" name="videoUrl3"  required></td>
	      <td><input type="text" class="form-control is-valid" name="imgUrl3"  required></td>
	    </tr>
	    <tr id="lineLast">
	      <td></td>
	      <td></td>
	      <td><button class="btn btn-primary" type="submit">提交</button></td>
	      <td><a class="btn btn-outline-primary" href="javascript:addEpisode();" role="button">在添加1集</a></td>
	    </tr>
	  </tbody>
  </form>
</table>
</div>
</body>
</html>
<script>
	var which = 4;
	function addEpisode(){
		
		var ele = "";
		ele += "<tr>";
		ele += "<td><input type='number' class='form-control is-valid' name='which"+which+"'  required></td>";
		ele += "<td><input type='text' class='form-control is-valid' name='plotName"+which+"'  required></td>";
		ele += "<td><input type='text' class='form-control is-valid' name='videoUrl"+which+"'  required></td>";
		ele += "<td><input type='text' class='form-control is-valid' name='imgUrl"+which+"'  required></td>";
		ele += "</tr>";
		
		$("#lineLast").before(ele);
		
	}
</script>
